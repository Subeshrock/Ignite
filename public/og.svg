<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="fl" x1="32" y1="60" x2="32" y2="4" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF4500"/>
      <stop offset=".5" stop-color="#FF6B2B"/>
      <stop offset="1" stop-color="#FFA500"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <clipPath id="gridMask">
      <ellipse cx="600" cy="280" rx="700" ry="400"/>
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#050507"/>
  
  <!-- Grid -->
  <g clip-path="url(#gridMask)" opacity="0.4">
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M 72 0 L 0 0 0 72" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>
  
  <!-- Glow -->
  <ellipse cx="600" cy="200" rx="500" ry="350" fill="url(#glow)" opacity="0.6"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#f97316" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Logo & Title Group -->
  <g transform="translate(600, 140)">
    <!-- Flame Icon -->
    <path d="M0 -60 C0 -60 -20 -35 -20 -15 C-20 -5 -14.2 0 -8 0 C-14.2 0 -20 5 -20 15 C-20 35 0 60 0 60 C0 60 20 35 20 15 C20 5 14.2 0 8 0 C14.2 0 20 -5 20 -15 C20 -35 0 -60 0 -60 Z M0 40 C-8 40 -12 25 -12 15 C-12 10 -10.4 6 -8 6 C-10.4 6 -12 10 -12 15 C-12 25 -8 40 0 40 Z" fill="url(#fl)" transform="translate(0, -10) scale(1.2)"/>
    
    <!-- Title -->
    <text x="0" y="30" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="700" fill="#f0f0f2">Ignite</text>
    <text x="0" y="70" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="400" fill="#a0a0ae">— MicroVMs with Docker UX</text>
  </g>
  
  <!-- Terminal -->
  <g transform="translate(150, 280)">
    <!-- Terminal Window -->
    <rect width="900" height="280" rx="16" fill="#111116" stroke="#1a1a22" stroke-width="1"/>
    
    <!-- Terminal Bar -->
    <rect width="900" height="40" rx="16" fill="#0c0c10"/>
    <rect y="24" width="900" height="16" fill="#0c0c10"/>
    
    <!-- Dots -->
    <circle cx="30" cy="20" r="6" fill="#ff5f57"/>
    <circle cx="50" cy="20" r="6" fill="#febc2e"/>
    <circle cx="70" cy="20" r="6" fill="#28c840"/>
    
    <!-- Terminal Title -->
    <text x="450" y="26" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#3a3a48">terminal</text>
    
    <!-- Terminal Content -->
    <g transform="translate(30, 80)" font-family="'JetBrains Mono', monospace" font-size="18" line-height="2.2">
      <text x="0" y="0" fill="#3a3a48"># Boot an Ubuntu MicroVM in &lt;150ms</text>
      <text x="0" y="40" fill="#f97316">$ </text><text x="30" y="40" fill="#f97316">ign</text><text x="72" y="40" fill="#a0a0ae"> run</text><text x="110" y="40" fill="#34d399">ubuntu:latest</text><text x="210" y="40" fill="#fbbf24">--vcpu 2 --memory 512M -p 8080:80</text>
      <text x="0" y="80" fill="#3a3a48">⚡ VM booted in 127ms — 172.19.0.2</text>
      
      <text x="0" y="140" fill="#3a3a48"># It's a real VM with its own kernel</text>
      <text x="0" y="180" fill="#f97316">$ </text><text x="30" y="180" fill="#f97316">ign</text><text x="72" y="180" fill="#a0a0ae"> exec</text><text x="120" y="180" fill="#34d399">my-vm</text><text x="180" y="180" fill="#a0a0ae"> uname -a</text>
      <text x="0" y="220" fill="#3a3a48">Linux ignite-vm 5.10.0-ignite #1 SMP x86_64 GNU/Linux</text>
    </g>
  </g>
  
  <!-- Tagline at bottom -->
  <text x="600" y="610" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#a0a0ae">Run VMs like containers. <tspan fill="#fb923c">Isolated like nothing else.</tspan></text>
</svg>