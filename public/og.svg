<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdd835"/>
      <stop offset="60%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#a07800"/>
    </linearGradient>
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fdd835"/>
      <stop offset="50%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#d4a017" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#d4a017" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sphereGrad" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#fdd835"/>
      <stop offset="60%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#7a5500"/>
    </radialGradient>
    <clipPath id="gridMask">
      <ellipse cx="600" cy="315" rx="720" ry="420"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#04040a"/>

  <!-- Subtle grid -->
  <g clip-path="url(#gridMask)" opacity="0.25">
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M 72 0 L 0 0 0 72" fill="none" stroke="#22d3ee" stroke-width="0.4" opacity="0.2"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>

  <!-- Background glow -->
  <ellipse cx="600" cy="260" rx="580" ry="380" fill="url(#bgGlow)"/>

  <!-- Logo group centered top -->
  <g transform="translate(600, 120)">
    <!-- Sphere shadow -->
    <ellipse cx="0" cy="60" rx="55" ry="12" fill="#000" opacity="0.4"/>
    <!-- Dark sphere -->
    <circle cx="0" cy="0" r="58" fill="#0d0d18" stroke="#1e1e38" stroke-width="1.5"/>
    <!-- Gold fill -->
    <circle cx="0" cy="0" r="52" fill="url(#sphereGrad)" opacity="0.92"/>
    <!-- Grid lines -->
    <g stroke="#04040a" stroke-width="1.8" fill="none" opacity="0.7">
      <line x1="0" y1="-52" x2="0" y2="52"/>
      <line x1="-52" y1="0" x2="52" y2="0"/>
      <line x1="-37" y1="-37" x2="37" y2="37"/>
      <line x1="37" y1="-37" x2="-37" y2="37"/>
      <ellipse cx="0" cy="0" rx="52" ry="22"/>
      <ellipse cx="0" cy="0" rx="22" ry="52"/>
    </g>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="6" fill="#fdd835" stroke="#04040a" stroke-width="1"/>
    <!-- Orbital ring -->
    <ellipse cx="0" cy="0" rx="72" ry="22" fill="none"
      stroke="url(#orbitGrad)" stroke-width="5"
      transform="rotate(-28)" stroke-linecap="round"/>
    <!-- Orbital ring behind (darker) -->
    <ellipse cx="0" cy="0" rx="72" ry="22" fill="none"
      stroke="#0d0d18" stroke-width="6"
      transform="rotate(-28)"
      stroke-dasharray="120 110"/>
  </g>

  <!-- Title -->
  <text x="600" y="228" text-anchor="middle"
    font-family="Inter, system-ui, sans-serif"
    font-size="52" font-weight="800" letter-spacing="-2"
    fill="url(#titleGrad)">VYOMA</text>

  <text x="600" y="266" text-anchor="middle"
    font-family="Inter, system-ui, sans-serif"
    font-size="22" font-weight="400" letter-spacing="6"
    fill="#a0a0ae">MICRO-VM MANAGER</text>

  <!-- Terminal window -->
  <g transform="translate(140, 300)">
    <rect width="920" height="270" rx="16" fill="#0d0d18" stroke="#141428" stroke-width="1"/>
    <rect width="920" height="42" rx="16" fill="#080810"/>
    <rect y="26" width="920" height="16" fill="#080810"/>
    <circle cx="28" cy="21" r="6" fill="#ff5f57"/>
    <circle cx="50" cy="21" r="6" fill="#febc2e"/>
    <circle cx="72" cy="21" r="6" fill="#28c840"/>
    <text x="460" y="27" text-anchor="middle"
      font-family="JetBrains Mono, monospace" font-size="11" fill="#3a3a55">terminal</text>

    <g transform="translate(32, 82)" font-family="JetBrains Mono, monospace" font-size="16">
      <text x="0" y="0" fill="#3a3a55"># Boot a MicroVM in &lt;150ms using cloud-hypervisor</text>
      <text x="0" y="38" fill="#f0c040">$ </text>
      <text x="26" y="38" fill="#f0c040">vyoma</text>
      <text x="98" y="38" fill="#a0a0ae"> run </text>
      <text x="144" y="38" fill="#34d399">ubuntu:latest</text>
      <text x="282" y="38" fill="#22d3ee">--vcpu 2 --memory 512M -p 8080:80</text>
      <text x="0" y="76" fill="#3a3a55">⚡ VM booted in 118ms — 172.19.0.2</text>
      <text x="0" y="134" fill="#3a3a55"># Hardware-isolated — own kernel via KVM</text>
      <text x="0" y="172" fill="#f0c040">$ </text>
      <text x="26" y="172" fill="#f0c040">vyoma</text>
      <text x="98" y="172" fill="#a0a0ae"> exec </text>
      <text x="156" y="172" fill="#34d399">my-vm</text>
      <text x="228" y="172" fill="#a0a0ae"> uname -r</text>
      <text x="0" y="210" fill="#3a3a55">6.1.0-vyoma — cloud-hypervisor VMM</text>
    </g>
  </g>

  <!-- Tagline -->
  <text x="600" y="614" text-anchor="middle"
    font-family="Inter, system-ui, sans-serif" font-size="20" fill="#606070">
    Run OCI images with hardware-level isolation.
    <tspan fill="#f0c040"> Pervasive as the sky.</tspan>
  </text>
</svg>
